<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>2026 Federasyon Karması Sıralaması</title>
<!-- file:// protokolü için gömülü veri (generate_rankings_json.py tarafından üretilir) -->
<script src="results_inline.js"></script>
<style>
  :root {
    --bg:      #0f172a;
    --card:    #1e293b;
    --border:  #334155;
    --text:    #e2e8f0;
    --muted:   #94a3b8;
    --gold:    #f59e0b;
    --green:   #22c55e;
    --blue:    #3b82f6;
    --red:     #ef4444;
    --purple:  #a855f7;
    --teal:    #14b8a6;
    --orange:  #fb923c;
    --pink:    #f472b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

  /* ── Header ── */
  header { background: #0f172a; border-bottom: 1px solid var(--border); padding: 10px 14px; position: sticky; top: 0; z-index: 100; }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  h1 { font-size: 15px; font-weight: 700; color: var(--gold); }
  .updated { font-size: 10px; color: var(--muted); }
  .legs-badge { font-size: 10px; background: var(--card); border: 1px solid var(--border); padding: 2px 8px; border-radius: 12px; color: var(--teal); }
  .refresh-btn { background: var(--blue); color: #fff; border: none; padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }

  /* ── Sekmeler ── */
  .tabs { display: flex; gap: 0; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── Filtreler (sadece Sıralama sekmesinde) ── */
  .filters { padding: 8px 12px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .filter-btn {
    padding: 4px 12px; border-radius: 16px; border: 1px solid var(--border);
    background: var(--bg); color: var(--muted); font-size: 11px; cursor: pointer; transition: all .15s;
  }
  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .filter-sep { width: 1px; height: 20px; background: var(--border); }
  .filter-label { font-size: 10px; color: var(--muted); }

  /* ── Leg toggle ── */
  .leg-toggle { display: flex; gap: 4px; padding: 6px 12px; background: #162032; border-bottom: 1px solid var(--border); }
  .leg-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: 11px; cursor: pointer; }
  .leg-btn.active { background: var(--teal); border-color: var(--teal); color: #111; font-weight: 700; }

  /* ── Tablo bölüm ── */
  .group-section { margin: 10px 10px 0; }
  .group-header {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px 10px 0 0;
    padding: 9px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  }
  .group-title { font-size: 13px; font-weight: 600; }
  .group-subtitle { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .group-stats { font-size: 10px; color: var(--muted); text-align: right; line-height: 1.5; }
  .group-toggle { color: var(--muted); font-size: 16px; }

  .group-table { border: 1px solid var(--border); border-top: 0; border-radius: 0 0 10px 10px; overflow: hidden; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #1a2740; color: var(--muted); font-size: 10px; font-weight: 600; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .4px; }
  td { padding: 7px 8px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
  tr:last-child td { border-bottom: 0; }
  tr.selected-tr     { background: rgba(34,197,94,.07); }
  tr.selected-bolge  { background: rgba(59,130,246,.07); }
  tr.selected-multi  { background: rgba(245,158,11,.07); }
  tr.selected-tie    { background: rgba(168,85,247,.08); }
  tr.row-expanded    { background: rgba(255,255,255,.04); }

  /* ── Sütunlar ── */
  .col-rank  { width: 32px; text-align: center; font-weight: 700; }
  .col-name  { min-width: 120px; }
  .col-score { width: 44px; text-align: center; font-weight: 700; }
  .col-sel   { width: 72px; text-align: center; }
  .col-region{ width: 30px; text-align: center; }
  .col-expand{ width: 24px; text-align: center; cursor: pointer; }
  .name-cell { font-weight: 600; font-size: 12px; }
  .club-cell { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .tie-mark  { color: var(--purple); font-size: 11px; margin-left: 3px; }

  /* ── Seçim badge ── */
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge-tr     { background: rgba(34,197,94,.2);  color: var(--green); }
  .badge-bolge  { background: rgba(59,130,246,.2); color: var(--blue); }
  .badge-multi  { background: rgba(245,158,11,.25); color: var(--gold); }
  .badge-baraj  { background: rgba(239,68,68,.15); color: var(--red); font-size: 9px; }
  .badge-tie    { background: rgba(168,85,247,.2); color: var(--purple); font-size: 9px; }
  .badge-none   { color: var(--border); font-size: 9px; }
  .badge-first  { background: rgba(250,204,21,.2); color: #facc15; font-size: 9px; margin-left: 3px; }

  /* ── Puan rengi ── */
  .pts-9  { color: var(--gold); font-weight:800 }
  .pts-7  { color: #fb923c; }
  .pts-6  { color: #facc15; }
  .pts-5  { color: var(--green); }
  .pts-4  { color: var(--teal); }
  .pts-3  { color: var(--blue); }
  .pts-2  { color: var(--purple); }
  .pts-1  { color: var(--muted); }
  .pts-0  { color: var(--border); }

  /* ── Genişletilmiş satır ── */
  .expand-row td { padding: 0 !important; }
  .event-detail {
    padding: 8px 12px; background: #162032; border-top: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .cum-sums { width: 100%; display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .cum-badge { font-size: 11px; color: var(--muted); background: #1e293b; border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; }
  .cum-badge b { color: var(--text); margin-left: 2px; }
  .pending-section { width: 100%; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .pending-label { font-size: 10px; color: var(--orange); width: 100%; margin-bottom: 2px; font-weight: 600; letter-spacing: .3px; }
  .pending-chip { border-color: #7c3a00 !important; background: #1c1200 !important; }
  .event-chip {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 7px; border-radius: 7px; font-size: 10px;
    background: var(--card); border: 1px solid var(--border);
  }
  .event-chip.in-top3 { border-color: var(--gold); background: rgba(245,158,11,.08); }
  .event-chip .ep { font-weight: 700; min-width: 10px; }
  .event-chip .en { color: var(--muted); }
  .top3-crown     { font-size: 10px; }

  /* ── Sıra rengi ── */
  .rank-1 { color: var(--gold) }
  .rank-2 { color: #e2e8f0 }
  .rank-3 { color: #cd7f32 }

  /* ── Kulüp tablosu ── */
  .club-table-wrap { margin: 10px; }
  .club-table-wrap h3 { font-size: 13px; color: var(--gold); margin-bottom: 8px; padding: 8px 0; }
  .club-filter-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .club-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
  .club-table th { background: #1a2740; color: var(--muted); font-size: 10px; padding: 6px 10px; text-align: left; }
  .club-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .club-table tr:last-child td { border-bottom: 0; }
  .club-table tr.club-row { cursor: pointer; transition: background .1s; }
  .club-table tr.club-row:hover { background: rgba(59,130,246,.1); }
  .club-total { font-weight: 700; color: var(--text); }
  .num-multi { color: var(--gold); font-weight: 700; }
  .num-tr    { color: var(--green); font-weight: 700; }
  .num-bolge { color: var(--blue); font-weight: 700; }

  /* ── Özet Matris ── */
  .matrix-wrap { margin: 10px; }
  .matrix-wrap h3 { font-size: 13px; color: var(--gold); margin-bottom: 8px; padding-top: 8px; }
  .matrix-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
  .matrix-table th { background: #1a2740; color: var(--muted); font-size: 10px; padding: 6px 10px; text-align: center; }
  .matrix-table th:first-child { text-align: left; }
  .matrix-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 12px; text-align: center; }
  .matrix-table td:first-child { text-align: left; font-weight: 600; }
  .matrix-table tr:last-child td { border-bottom: 0; font-weight: 700; background: rgba(255,255,255,.03); }

  /* ── Barajlar ── */
  .threshold-wrap { margin: 10px; }
  .threshold-wrap h3 { font-size: 13px; color: var(--gold); margin-bottom: 8px; padding-top: 8px; }
  .threshold-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
  .threshold-table th { background: #1a2740; color: var(--muted); font-size: 10px; padding: 7px 10px; text-align: left; }
  .threshold-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .threshold-table tr:last-child td { border-bottom: 0; }
  .pts-system-box { background: var(--card); border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
  .pts-system-box h4 { font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
  .pts-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .pts-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 9px; border-radius: 8px; background: #1a2740; border: 1px solid var(--border); font-size: 11px; }

  /* ── Arama ── */
  .search-wrap { margin: 10px; }
  .search-box { display: flex; gap: 6px; margin-bottom: 12px; }
  .search-input {
    flex: 1; padding: 10px 14px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
  }
  .search-input:focus { border-color: var(--blue); }
  .search-btn {
    padding: 10px 16px; background: var(--blue); border: none; border-radius: 8px;
    color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .search-result { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
  .search-result-header { padding: 10px 12px; border-bottom: 1px solid var(--border); background: #162032; }
  .search-result-name { font-size: 14px; font-weight: 700; }
  .search-result-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .search-result-ranks { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; }
  .rank-chip { display: inline-flex; flex-direction: column; align-items: center; background: #1a2740; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; min-width: 70px; }
  .rank-chip .rc-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .rank-chip .rc-val { font-size: 16px; font-weight: 800; margin-top: 1px; }
  .search-result-events { padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 4px; border-top: 1px solid var(--border); }
  .search-empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

  /* ── Modal (kulüp sporcuları) ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; max-width: 480px; width: 94%; max-height: 80vh; overflow-y: auto; }
  .modal-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); }
  .modal-title { font-size: 14px; font-weight: 700; color: var(--gold); }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .modal-body { padding: 10px; }
  .modal-athlete { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; margin-bottom: 4px; background: #162032; border: 1px solid var(--border); }
  .modal-athlete-rank { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 24px; text-align: center; }
  .modal-athlete-info { flex: 1; }
  .modal-athlete-name { font-size: 12px; font-weight: 600; }
  .modal-athlete-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* ── Loader ── */
  #loader { display: flex; align-items: center; justify-content: center; height: 60vh; font-size: 16px; color: var(--muted); text-align: center; padding: 20px; }

  /* ── Tab content ── */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Responsive ── */
  @media(max-width:480px) {
    .col-region { display: none; }
    .hide-sm    { display: none; }
  }
</style>
</head>
<body>
<!-- ── Şifre Koruması ── -->
<div id="pw-overlay" style="display:none;position:fixed;inset:0;background:#0f172a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
  <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:36px 40px;text-align:center;max-width:340px;width:90%;">
    <div style="font-size:28px;margin-bottom:8px;">🏊</div>
    <h2 style="color:#e2e8f0;font-size:18px;margin-bottom:4px;">2026 Federasyon Karması</h2>
    <p style="color:#94a3b8;font-size:13px;margin-bottom:20px;">Devam etmek için şifreyi girin</p>
    <input id="pw-input" type="password" placeholder="Şifre"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      style="width:100%;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:15px;outline:none;margin-bottom:12px;"
      onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()"
      style="width:100%;padding:10px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;">
      Giriş
    </button>
    <p id="pw-err" style="color:#ef4444;font-size:12px;margin-top:10px;display:none;">Yanlış şifre</p>
    <p id="pw-hint" style="color:#64748b;font-size:10px;margin-top:6px;display:none;"></p>
  </div>
</div>
<script>
// ── Merkezi auth (gh-pages/auth.json) ────────────────────────────────────────
const AUTH_URL = 'https://gokaygunduz-gg.github.io/bolge-karma-2026/auth.json';
let _auth = null;  // {pw, admin_pw, pw_off}

async function loadAuth() {
  try {
    const r = await fetch(AUTH_URL + '?t=' + Date.now());
    if (r.ok) _auth = await r.json();
  } catch(e) {}
  if (!_auth) _auth = { pw: 'karma2026', admin_pw: 'admin2026', pw_off: false };
}

function getMainPw()  { return _auth ? _auth.pw        : 'karma2026'; }
function getAdminPw() { return _auth ? _auth.admin_pw  : 'admin2026'; }
function isPwOff()    { return _auth ? !!_auth.pw_off  : false; }

(async function(){
  const KEY = "bolge_karma_auth";
  const overlay = document.getElementById("pw-overlay");
  await loadAuth();
  if(isPwOff() || sessionStorage.getItem(KEY) === "1"){
    overlay.style.display = "none";
  } else {
    overlay.style.display = "flex";
    setTimeout(()=>document.getElementById("pw-input").focus(), 100);
  }
  window.checkPw = function(){
    // trim() → Android autocorrect bazen boşluk ekliyor
    const v = document.getElementById("pw-input").value.trim();
    if(v === getMainPw()){
      sessionStorage.setItem(KEY,"1"); overlay.style.display="none";
    } else {
      document.getElementById("pw-err").style.display="block";
      document.getElementById("pw-input").value="";
      // Hatalı giriş sayısını logla (localStorage'da — hata ayıklama için)
      const logKey='karma_fail_log';
      const log=JSON.parse(localStorage.getItem(logKey)||'[]');
      log.push({t:new Date().toISOString(),len:v.length});
      if(log.length>20) log.splice(0,log.length-20);
      localStorage.setItem(logKey,JSON.stringify(log));
    }
  };
})();
</script>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let DATA        = null;
let filterAge   = 'all';
let filterGender= 'all';
let filterRegion= 'all';
let filterSel   = 'all';
let activeLeg   = 'combined';
let activeTab   = 'rankings';
let activeClubGroup = 'overall';
let expanded    = new Set();
let _searchTerm = '';

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('filter-bar').style.display = tab === 'rankings' ? '' : 'none';
  renderAll();
}

// ── Filter listeners ──────────────────────────────────────────────────────────
document.querySelectorAll('[data-age]').forEach(btn => {
  btn.addEventListener('click', () => {
    filterAge = btn.dataset.age;
    document.querySelectorAll('[data-age]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  });
});
document.querySelectorAll('[data-gender]').forEach(btn => {
  btn.addEventListener('click', () => {
    filterGender = btn.dataset.gender;
    document.querySelectorAll('[data-gender]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  });
});
document.querySelectorAll('[data-region]').forEach(btn => {
  btn.addEventListener('click', () => {
    filterRegion = btn.dataset.region;
    document.querySelectorAll('[data-region]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  });
});
document.querySelectorAll('[data-sel]').forEach(btn => {
  btn.addEventListener('click', () => {
    filterSel = btn.dataset.sel;
    document.querySelectorAll('[data-sel]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  });
});
document.querySelectorAll('[data-leg]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeLeg = btn.dataset.leg;
    document.querySelectorAll('[data-leg]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  });
});

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  if (!DATA) return;
  document.getElementById('updated').textContent = 'Son güncelleme: ' + DATA.generated_at;
  document.getElementById('legs-badge').textContent = legsLabel(DATA.legs);
  const content = document.getElementById('content');
  content.innerHTML = '';

  if      (activeTab === 'rankings')   renderRankings(content);
  else if (activeTab === 'search')     renderSearch(content);
  else if (activeTab === 'clubs')      renderClubs(content);
  else if (activeTab === 'yarıslar')   renderYarıslar(content);
  else if (activeTab === 'kota')      renderKota(content);
  else if (activeTab === 'barajlar')  renderBarajlar(content);
  else if (activeTab === 'matrix')     renderMatrix(content);
  else if (activeTab === 'admin')      renderAdmin(content);
}

function legsLabel(legs) {
  if (!legs) return '—';
  const parts = [];
  if (legs.includes('antalya')) parts.push('Antalya ✓');
  if (legs.includes('edirne'))  parts.push('Edirne ✓');
  return parts.join(' + ') || legs;
}

// ── Rankings tab ──────────────────────────────────────────────────────────────
function renderRankings(content) {
  const ORDER = ['2013_F','2013_M','2012_F','2012_M','2011_F','2011_M'];
  let anyShown = false;
  for (const key of ORDER) {
    const grp = DATA.groups[key];
    if (!grp) continue;
    if (filterAge    !== 'all' && String(grp.birth_year) !== filterAge)  continue;
    if (filterGender !== 'all' && grp.gender !== filterGender)           continue;

    let athletes = grp.athletes;
    if (filterRegion !== 'all') {
      athletes = athletes.filter(a =>
        a.selected === 'MULTINATIONS' || String(a.region) === filterRegion
      );
    }
    if (filterSel === 'selected') {
      athletes = athletes.filter(a =>
        a.selected === 'TR' || a.selected === 'BÖLGE' || a.selected === 'MULTINATIONS'
      );
    }
    if (athletes.length === 0) continue;
    anyShown = true;
    content.appendChild(buildGroupSection(key, grp, athletes));
  }
  if (!anyShown) {
    content.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted)">Sonuç bulunamadı</div>';
  }
}

function buildGroupSection(key, grp, athletes) {
  const sec = document.createElement('div');
  sec.className = 'group-section';
  const gIcon  = grp.gender === 'F' ? '♀' : '♂';
  const gColor = grp.gender === 'F' ? '#f472b6' : '#60a5fa';
  const multiC = athletes.filter(a => a.selected==='MULTINATIONS').length;
  const trC    = athletes.filter(a => a.selected==='TR').length;
  const bC     = athletes.filter(a => a.selected==='BÖLGE').length;

  sec.innerHTML = `
    <div class="group-header" onclick="toggleGroup('${key}')">
      <div>
        <div class="group-title">
          <span style="color:${gColor}">${gIcon}</span>
          ${grp.age_label} ${grp.gender_label}
        </div>
        <div class="group-subtitle">
          TR: ${grp.tr_quota} &nbsp;|&nbsp; B1: ${grp.region_1_quota} &nbsp;|&nbsp; Diğer: ${grp.region_other_quota}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="group-stats">
          <div><span style="color:var(--gold)">MULTI: ${multiC}</span></div>
          <div><span style="color:var(--green)">TR: ${trC}</span> &nbsp; <span style="color:var(--blue)">Blg: ${bC}</span></div>
        </div>
        <span class="group-toggle" id="toggle-${key}">▾</span>
      </div>
    </div>
    <div class="group-table" id="grp-${key}">
      ${buildTable(key, grp, athletes)}
    </div>
  `;
  return sec;
}

function toggleGroup(key) {
  const el  = document.getElementById('grp-' + key);
  const tog = document.getElementById('toggle-' + key);
  if (el.style.display === 'none') { el.style.display = ''; tog.textContent = '▾'; }
  else                              { el.style.display = 'none'; tog.textContent = '▸'; }
}

function buildTable(groupKey, grp, athletes) {
  let rows = '';
  athletes.forEach((a, idx) => {
    const expKey = groupKey + '_' + idx;
    const isExp  = expanded.has(expKey);

    const isMulti = a.selected === 'MULTINATIONS';
    const isTied  = a.tied && !isMulti;
    let rowCls = '';
    if (isMulti)              rowCls = 'selected-multi';
    else if (isTied)          rowCls = 'selected-tie';
    else if (a.selected==='TR')    rowCls = 'selected-tr';
    else if (a.selected==='BÖLGE') rowCls = 'selected-bolge';
    if (isExp) rowCls += ' row-expanded';

    const rankCls = (a.rank && a.rank <= 3 && !isMulti) ? `rank-${a.rank}` : '';
    const rankStr = isMulti ? '★' : (a.rank || '—');

    let badgeHtml = '';
    if (isMulti)
      badgeHtml = `<span class="badge badge-multi">Multinations</span>`;
    else if (a.selected==='TR')
      badgeHtml = `<span class="badge badge-tr">${a.selected_slot}</span>`;
    else if (a.selected==='BÖLGE') {
      const tieNote = isTied ? ' ★' : '';
      badgeHtml = `<span class="badge badge-bolge">${a.selected_slot}${tieNote}</span>`;
    } else if (a.selected==='BARAJ_YOK')
      badgeHtml = `<span class="badge badge-baraj">Baraj↓</span>`;
    else {
      if (isTied) badgeHtml = `<span class="badge badge-tie">Eşit★</span>`;
      else        badgeHtml = `<span class="badge-none">—</span>`;
    }

    let score, events;
    if (activeLeg === 'antalya') {
      score  = a.top3_antalya;
      events = a.events_antalya;
    } else if (activeLeg === 'edirne') {
      score  = a.top3_edirne;
      events = a.events_edirne;
    } else {
      score  = a.top3;
      events = a.events;
    }

    const tieStar = (isTied && a.selected !== 'TR') ? '<span class="tie-mark">★</span>' : '';

    let firstBadge = '';
    try {
      if (a.first_place && a.first_place.length > 0) {
        const fp = a.first_place;
        const legAbbr = {antalya:'A', edirne:'E'};
        const details = fp.map(f => `${legAbbr[f.leg]||f.leg} ${f.dist}m ${f.stroke}`).join(', ');
        const cnt = fp.length;
        firstBadge = `<span class="badge badge-first" title="1. Bitis: ${details}">\uD83E\uDD47 ${cnt > 1 ? cnt+'\u00D7 ' : ''}1.</span>`;
      }
    } catch(e) { firstBadge = ''; }

    rows += `<tr class="${rowCls}">
      <td class="col-rank ${rankCls}">${rankStr}</td>
      <td class="col-name">
        <div class="name-cell">${a.name}${tieStar}${firstBadge}</div>
        <div class="club-cell">${a.club || ''} ${a.city ? '· '+a.city : ''}</div>
      </td>
      <td class="col-score ${ptsClass(Math.floor(score/3))}">${score}</td>
      <td class="col-sel">${badgeHtml}</td>
      <td class="col-region hide-sm">${a.region || '—'}</td>
      <td class="col-expand" onclick="toggleRow('${groupKey}',${idx},event)">${isExp ? '▲' : '▼'}</td>
    </tr>`;

    if (isExp) {
      const cumBadges    = buildCumBadges(a.seq || []);
      const pendingHtml  = buildPendingChips(a.pending_events || []);
      rows += `<tr class="expand-row"><td colspan="6"><div class="event-detail">
        ${cumBadges  ? `<div class="cum-sums">${cumBadges}</div>` : ''}
        ${buildEventChips(events || [])}
        ${pendingHtml}
      </div></td></tr>`;
    }
  });

  return `<table>
    <thead><tr>
      <th class="col-rank">#</th>
      <th>Ad Soyad / Kulüp</th>
      <th class="col-score">Puan</th>
      <th class="col-sel">Seçim</th>
      <th class="col-region hide-sm">Blg</th>
      <th class="col-expand"></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function buildPendingChips(pending) {
  if (!pending || pending.length === 0) return '';
  const chips = pending.map(e => {
    const timeStr = e.entry_time ? ` <span style="color:var(--muted);font-size:10px">${e.entry_time}</span>` : '';
    const ptsStr  = e.entry_points > 0
      ? ` <span style="color:#f0a500;font-size:10px;font-weight:600">${e.entry_points}p</span>`
      : '';
    return `<div class="event-chip pending-chip">
      <span class="ep pts-0">⏳</span>
      <span class="en">${e.dist}m ${e.stroke}${timeStr}${ptsStr}</span>
    </div>`;
  }).join('');
  return `<div class="pending-section">
    <div class="pending-label">Bekleyen Yarışlar (Edirne)</div>
    ${chips}
  </div>`;
}

function buildCumBadges(seq) {
  if (!seq || seq.length < 3) return '';
  const badges = [];
  let running = 0;
  for (let i = 0; i < Math.min(seq.length, 6); i++) {
    running += seq[i];
    if (i >= 2) { // 3. elemandan itibaren (0-indexed: i=2 → 3Y)
      const label = `${i+1}Y`;
      badges.push(`<span class="cum-badge">${label}:<b>${running}</b></span>`);
    }
  }
  return badges.join('');
}

function buildEventChips(events) {
  if (!events || events.length === 0)
    return '<span style="color:var(--muted);font-size:11px">Bu yarışta puan yok</span>';
  return events.map(ev => {
    const crown = ev.in_top3 ? '<span class="top3-crown">★</span>' : '';
    return `<div class="event-chip ${ev.in_top3 ? 'in-top3' : ''}">
      ${crown}<span class="ep ${ptsClass(ev.points)}">${ev.points}</span>
      <span class="en">${ev.event}</span>
    </div>`;
  }).join('');
}

function toggleRow(groupKey, idx, e) {
  e.stopPropagation();
  const key = groupKey + '_' + idx;
  if (expanded.has(key)) expanded.delete(key);
  else expanded.add(key);
  renderAll();
}

function ptsClass(p) {
  if (p >= 9) return 'pts-9';
  if (p >= 7) return 'pts-7';
  if (p >= 6) return 'pts-6';
  if (p >= 5) return 'pts-5';
  if (p >= 4) return 'pts-4';
  if (p >= 3) return 'pts-3';
  if (p >= 2) return 'pts-2';
  if (p >= 1) return 'pts-1';
  return 'pts-0';
}

// ── Search tab ────────────────────────────────────────────────────────────────
function renderSearch(content) {
  const wrap = document.createElement('div');
  wrap.className = 'search-wrap';

  wrap.innerHTML = `
    <div class="search-box">
      <input id="search-input" class="search-input" type="search" placeholder="Sporcu adı ara..."
        autocomplete="off" autocorrect="off" autocapitalize="off"
        value="${_esc(_searchTerm)}"
        onkeydown="if(event.key==='Enter'){_searchTerm=this.value.trim();renderAll();}">
      <button class="search-btn" onclick="_searchTerm=document.getElementById('search-input').value.trim();renderAll()">Ara</button>
    </div>
    <div id="search-results"></div>
  `;
  content.appendChild(wrap);

  const resultsDiv = wrap.querySelector('#search-results');
  if (!_searchTerm) {
    resultsDiv.innerHTML = '<div class="search-empty">Sporcu adını yazıp Ara\'ya basın</div>';
    setTimeout(()=>{ const el=document.getElementById('search-input'); if(el) el.focus(); }, 50);
    return;
  }

  // Normalize for search
  function norm(s) {
    return (s||'').replace(/İ/g,'I').replace(/ı/g,'i').replace(/Ş/g,'S').replace(/ş/g,'s')
      .replace(/Ç/g,'C').replace(/ç/g,'c').replace(/Ğ/g,'G').replace(/ğ/g,'g')
      .replace(/Ö/g,'O').replace(/ö/g,'o').replace(/Ü/g,'U').replace(/ü/g,'u')
      .toLowerCase();
  }

  const term = norm(_searchTerm);
  const ORDER = ['2013_F','2013_M','2012_F','2012_M','2011_F','2011_M'];
  const AGE_LABEL = {2013:'13 Yaş',2012:'14 Yaş',2011:'15 Yaş'};
  const GEN_LABEL = {F:'Kadın',M:'Erkek'};
  let found = 0;

  for (const key of ORDER) {
    const grp = DATA.groups[key];
    if (!grp) continue;
    grp.athletes.forEach(a => {
      if (!norm(a.name).includes(term)) return;
      found++;

      // Bölge sıralaması: aynı grup içinde aynı bölgeden kaçıncı
      const sameRegion = grp.athletes.filter(x => x.region === a.region && x.selected !== 'MULTINATIONS');
      const regionRank = sameRegion.findIndex(x => x.name === a.name) + 1;

      // Seçim badge
      let selBadge = '';
      if (a.selected === 'MULTINATIONS') selBadge = `<span class="badge badge-multi">Multinations</span>`;
      else if (a.selected === 'TR')      selBadge = `<span class="badge badge-tr">${a.selected_slot}</span>`;
      else if (a.selected === 'BÖLGE')   selBadge = `<span class="badge badge-bolge">${a.selected_slot}</span>`;
      else if (a.selected === 'BARAJ_YOK') selBadge = `<span class="badge badge-baraj">Baraj↓</span>`;
      else                                selBadge = `<span class="badge-none">Seçilmedi</span>`;

      const gColor = grp.gender === 'F' ? '#f472b6' : '#60a5fa';
      const REGION_NAMES = {1:'İstanbul',2:'Marmara',3:'Ege',4:'İç Anadolu',5:'Karadeniz',6:'Güneydoğu'};

      const card = document.createElement('div');
      card.className = 'search-result';
      card.innerHTML = `
        <div class="search-result-header">
          <div class="search-result-name">
            <span style="color:${gColor}">${grp.gender==='F'?'♀':'♂'}</span>
            ${a.name} ${selBadge}
          </div>
          <div class="search-result-sub">${a.club||'—'} · ${a.city||'—'} · ${AGE_LABEL[a.birth_year]||a.birth_year} ${GEN_LABEL[grp.gender]||grp.gender}</div>
        </div>
        <div class="search-result-ranks">
          <div class="rank-chip">
            <span class="rc-label">Türkiye</span>
            <span class="rc-val ${a.rank && a.rank<=3?'rank-'+a.rank:''}">${a.selected==='MULTINATIONS'?'★':(a.rank||'—')}</span>
          </div>
          <div class="rank-chip">
            <span class="rc-label">B${a.region||'?'} ${REGION_NAMES[a.region]||''}</span>
            <span class="rc-val" style="color:var(--blue)">${regionRank || '—'}</span>
          </div>
          <div class="rank-chip">
            <span class="rc-label">Toplam Puan</span>
            <span class="rc-val ${ptsClass(Math.floor(a.top3/3))}">${a.top3}</span>
          </div>
          <div class="rank-chip">
            <span class="rc-label">Antalya</span>
            <span class="rc-val" style="color:var(--teal)">${a.top3_antalya||0}</span>
          </div>
          <div class="rank-chip">
            <span class="rc-label">Edirne</span>
            <span class="rc-val" style="color:var(--orange)">${a.top3_edirne||0}</span>
          </div>
        </div>
        <div class="search-result-events">
          ${buildEventChips(a.events || [])}
        </div>
      `;
      resultsDiv.appendChild(card);
    });
  }

  if (found === 0) {
    resultsDiv.innerHTML = `<div class="search-empty">
      "${_searchTerm}" için sonuç bulunamadı<br>
      <span style="font-size:11px;color:#475569">Türkçe karakter farkına dikkat etmeden arama yapılır</span>
    </div>`;
  }

  setTimeout(()=>{ const el=document.getElementById('search-input'); if(el) el.focus(); }, 50);
}

// ── Clubs tab ─────────────────────────────────────────────────────────────────
function renderClubs(content) {
  if (!DATA || !DATA.club_rankings) {
    content.innerHTML = '<div style="padding:20px;color:var(--muted)">Veri yok</div>';
    return;
  }
  const cr = DATA.club_rankings;

  const groupKeys = ['overall', ...Object.keys(cr.by_group || {}).sort()];
  const GROUP_LABEL = {
    overall: 'Genel Toplam',
    '2013_F': '13 Yaş Kadın', '2013_M': '13 Yaş Erkek',
    '2012_F': '14 Yaş Kadın', '2012_M': '14 Yaş Erkek',
    '2011_F': '15 Yaş Kadın', '2011_M': '15 Yaş Erkek',
  };

  const wrap = document.createElement('div');
  wrap.className = 'club-table-wrap';

  const filterRow = document.createElement('div');
  filterRow.className = 'club-filter-row';
  groupKeys.forEach(gk => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (gk === activeClubGroup ? ' active' : '');
    btn.textContent = GROUP_LABEL[gk] || gk;
    btn.onclick = () => { activeClubGroup = gk; renderAll(); };
    filterRow.appendChild(btn);
  });

  const h3 = document.createElement('h3');
  h3.textContent = 'Kulüp Sıralaması — ' + (GROUP_LABEL[activeClubGroup] || activeClubGroup);

  const data = activeClubGroup === 'overall' ? cr.overall : (cr.by_group[activeClubGroup] || []);

  // Kulübe tıklandığında seçili sporcularını göster
  const groupForModal = activeClubGroup === 'overall' ? null : activeClubGroup;

  let rows = '';
  data.filter(c => c.total > 0).forEach((c, i) => {
    rows += `<tr class="club-row" onclick="showClubAthletes('${_esc(c.club)}','${groupForModal||''}')">
      <td style="color:var(--muted);font-size:11px">${i+1}</td>
      <td style="color:var(--blue)">${c.club}</td>
      <td class="num-multi">${c.multi || 0}</td>
      <td class="num-tr">${c.tr || 0}</td>
      <td class="num-bolge">${c.bolge || 0}</td>
      <td class="club-total">${c.total}</td>
      <td style="color:var(--muted);font-size:14px">›</td>
    </tr>`;
  });

  const table = `<table class="club-table">
    <thead><tr>
      <th>#</th><th>Kulüp <span style="color:#475569;font-size:9px">(tıkla)</span></th>
      <th style="color:var(--gold)">Multi</th>
      <th style="color:var(--green)">TR</th>
      <th style="color:var(--blue)">Bölge</th>
      <th>Toplam</th>
      <th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  const tableDiv = document.createElement('div');
  tableDiv.innerHTML = table;
  wrap.appendChild(h3);
  wrap.appendChild(filterRow);
  wrap.appendChild(tableDiv);

  const note = document.createElement('div');
  note.style.cssText = 'font-size:10px;color:#475569;padding:6px 0;';
  note.textContent = 'Kulüp adına tıklayarak seçilen sporcuları görebilirsiniz.';
  wrap.appendChild(note);

  content.appendChild(wrap);
}

// Kulüp modal
window.showClubAthletes = function(club, groupKey) {
  const modal = document.getElementById('club-modal');
  const title = document.getElementById('club-modal-title');
  const body  = document.getElementById('club-modal-body');
  title.textContent = club;
  body.innerHTML = '';

  const ORDER = groupKey ? [groupKey] : ['2013_F','2013_M','2012_F','2012_M','2011_F','2011_M'];
  const AGE_LABEL = {2013:'13 Yaş',2012:'14 Yaş',2011:'15 Yaş'};
  const GEN_LABEL = {F:'Kadın',M:'Erkek'};
  let count = 0;

  for (const key of ORDER) {
    const grp = DATA && DATA.groups && DATA.groups[key];
    if (!grp) continue;
    const selected = grp.athletes.filter(a =>
      (a.club||'') === club &&
      (a.selected === 'TR' || a.selected === 'BÖLGE' || a.selected === 'MULTINATIONS')
    );
    if (selected.length === 0) continue;

    const groupLabel = `${AGE_LABEL[grp.birth_year]||grp.birth_year} ${GEN_LABEL[grp.gender]||grp.gender}`;
    const groupHeader = document.createElement('div');
    groupHeader.style.cssText = 'font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px 4px;';
    groupHeader.textContent = groupLabel;
    body.appendChild(groupHeader);

    selected.forEach(a => {
      count++;
      const gColor = grp.gender === 'F' ? '#f472b6' : '#60a5fa';
      let selBadge = '';
      if (a.selected === 'MULTINATIONS') selBadge = '<span class="badge badge-multi">Multi</span>';
      else if (a.selected === 'TR')      selBadge = `<span class="badge badge-tr">${a.selected_slot}</span>`;
      else if (a.selected === 'BÖLGE')   selBadge = `<span class="badge badge-bolge">${a.selected_slot}</span>`;

      const div = document.createElement('div');
      div.className = 'modal-athlete';
      div.innerHTML = `
        <div class="modal-athlete-rank ${a.rank&&a.rank<=3?'rank-'+a.rank:''}">${a.selected==='MULTINATIONS'?'★':(a.rank||'—')}</div>
        <div class="modal-athlete-info">
          <div class="modal-athlete-name"><span style="color:${gColor}">${grp.gender==='F'?'♀':'♂'}</span> ${a.name} ${selBadge}</div>
          <div class="modal-athlete-sub">${a.city||'—'} · B${a.region||'?'} · Puan: ${a.top3}</div>
        </div>
      `;
      body.appendChild(div);
    });
  }

  if (count === 0) {
    body.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Bu kulüpten seçilen sporcu yok</div>';
  }

  modal.classList.add('open');
};

window.closeClubModal = function() {

// ── Kota tab ──────────────────────────────────────────────────────────────────
function renderKota(content) {
  const wrap = document.createElement('div');
  wrap.className = 'threshold-wrap';
  wrap.innerHTML = '<h3>Kota Tablosu</h3>';

  if (DATA && DATA.groups) {
    const ORDER = ['2013_F','2013_M','2012_F','2012_M','2011_F','2011_M'];
    const AGE_LABEL = {2013:'13 Yaş',2012:'14 Yaş',2011:'15 Yaş'};
    const GEN_LABEL = {F:'Kadın',M:'Erkek'};

    let rows = '';
    for (const key of ORDER) {
      const grp = DATA.groups[key];
      if (!grp) continue;
      const gColor = grp.gender === 'F' ? '#f472b6' : '#60a5fa';
      const trC    = grp.athletes.filter(a=>a.selected==='TR').length;
      const bC     = grp.athletes.filter(a=>a.selected==='BÖLGE').length;
      const multiC = grp.athletes.filter(a=>a.selected==='MULTINATIONS').length;
      const barajPts = grp.min_points || '—';

      rows += `<tr>
        <td><span style="color:${gColor}">${grp.gender==='F'?'♀':'♂'}</span> ${AGE_LABEL[grp.birth_year]||grp.birth_year} ${GEN_LABEL[grp.gender]||grp.gender}</td>
        <td style="text-align:center;color:var(--gold);font-weight:700">${grp.tr_quota}</td>
        <td style="text-align:center;color:var(--blue)">${grp.region_1_quota}</td>
        <td style="text-align:center;color:var(--blue)">${grp.region_other_quota}</td>
        <td style="text-align:center;color:var(--red);font-weight:700">${barajPts}</td>
        <td style="text-align:center;color:var(--green)">${trC}/${grp.tr_quota}</td>
        <td style="text-align:center;color:var(--blue)">${bC}</td>
        <td style="text-align:center;color:var(--gold)">${multiC}</td>
      </tr>`;
    }

    const tbl = document.createElement('div');
    tbl.innerHTML = `
      <table class="threshold-table">
        <thead><tr>
          <th>Grup</th>
          <th style="text-align:center;color:var(--gold)">TR Kota</th>
          <th style="text-align:center;color:var(--blue)">B1 Kota</th>
          <th style="text-align:center;color:var(--blue)">B2-6 Kota</th>
          <th style="text-align:center;color:var(--red)">Min Puan</th>
          <th style="text-align:center;color:var(--green)">TR Dolu</th>
          <th style="text-align:center;color:var(--blue)">Bölge Dolu</th>
          <th style="text-align:center;color:var(--gold)">Multi</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="font-size:10px;color:#475569;padding:4px 0 12px">
        B1: İstanbul bölgesi · B2-6: Diğer 5 bölgeden her biri ayrı kota · Min Puan: seçilmek için gereken en az puan
      </div>
    `;
    wrap.appendChild(tbl);
  }

  content.appendChild(wrap);
}

// ── Yarışlar tab ──────────────────────────────────────────────────────────────
const EVENTS_LIST = [
  {stroke:'Serbest',   dists:[50,100,200,400,800,1500]},
  {stroke:'Sırtüstü',  dists:[50,100,200]},
  {stroke:'Kurbağalama',dists:[50,100,200]},
  {stroke:'Kelebek',   dists:[50,100,200]},
  {stroke:'Karışık',   dists:[200,400]},
];

let _yrStroke='Kelebek', _yrDist=200, _yrBy='2013', _yrGender='M', _yrRegion=0;

function renderYarıslar(content) {
  const data = window.RESULTS_DATA;
  if (!data) { content.innerHTML='<p style="padding:20px;color:var(--muted)">Veri yükleniyor...</p>'; return; }

  // Seçili grubun sporcuları
  const grpKey = `${_yrBy}_${_yrGender}`;
  const grp = data.groups[grpKey];

  // Branş seçimi (stroke butonları)
  const strokeBtns = EVENTS_LIST.map(e =>
    `<button class="filter-btn${_yrStroke===e.stroke?' active':''}" onclick="_yrStroke='${e.stroke}';_yrDist=${e.dists.includes(_yrDist)?_yrDist:e.dists[0]};renderAll()">${e.stroke}</button>`
  ).join('');

  // Mesafe butonları (seçili stroke'a göre)
  const selStroke = EVENTS_LIST.find(e=>e.stroke===_yrStroke) || EVENTS_LIST[0];
  const distBtns = selStroke.dists.map(d =>
    `<button class="filter-btn${_yrDist===d?' active':''}" onclick="_yrDist=${d};renderAll()">${d}m</button>`
  ).join('');

  // Yaş/cinsiyet
  const byBtns   = ['2013','2012','2011'].map(b => `<button class="filter-btn${_yrBy===b?' active':''}" onclick="_yrBy='${b}';renderAll()">${{2013:'13 Yaş',2012:'14 Yaş',2011:'15 Yaş'}[b]}</button>`).join('');
  const genBtns  = [['M','Erkek'],['F','Kadın']].map(([v,l]) => `<button class="filter-btn${_yrGender===v?' active':''}" onclick="_yrGender='${v}';renderAll()">${l}</button>`).join('');

  // Bölge filtresi
  const regBtns = [`<button class="filter-btn${_yrRegion===0?' active':''}" onclick="_yrRegion=0;renderAll()">Tümü</button>`]
    .concat([1,2,3,4,5,6].map(r => `<button class="filter-btn${_yrRegion===r?' active':''}" onclick="_yrRegion=${r};renderAll()">B${r}</button>`))
    .join('');

  // Tablo: seçili branşta puanı olan sporcuları topla
  let athletes = [];
  if (grp) {
    grp.athletes.forEach(a => {
      if (a.selected === 'MULTINATIONS') return;
      if (_yrRegion > 0 && a.region !== _yrRegion) return;
      // Birleşik (total) events listesinden ilgili branşı bul
      const ev = (a.events || []).find(e => e.stroke === _yrStroke && e.dist === _yrDist);
      const pts = ev ? ev.points : 0;
      if (pts > 0) athletes.push({...a, ev_pts: pts});
    });
  }

  // Puana göre sırala, eşitlikte tr_rank
  athletes.sort((a,b) => b.ev_pts - a.ev_pts || (a.rank||999) - (b.rank||999));

  // Satırlar
  let rank = 0, prevPts = -1, displayRank = 0;
  const rows = athletes.map(a => {
    rank++;
    if (a.ev_pts !== prevPts) { displayRank = rank; prevPts = a.ev_pts; }
    const selBadge = a.selected === 'TR' ? `<span class="badge badge-tr">TR-${a.selected_slot?.replace('TR-','')}</span>`
      : a.selected === 'BÖLGE' ? `<span class="badge badge-bolge">${a.selected_slot}</span>` : '';
    return `<tr>
      <td style="width:36px;text-align:center;color:var(--muted);font-size:12px">${displayRank}</td>
      <td>
        <div style="font-weight:600;font-size:13px">${a.name}</div>
        <div style="font-size:11px;color:var(--muted)">${a.club||''} ${a.city?'· '+a.city:''}</div>
      </td>
      <td style="width:50px;text-align:center">${selBadge}</td>
      <td style="width:44px;text-align:center">
        <span class="ep ${ptsClass(a.ev_pts)}" style="font-size:15px;font-weight:700">${a.ev_pts}</span>
      </td>
    </tr>`;
  }).join('');

  const empty = athletes.length === 0
    ? `<div style="padding:24px;text-align:center;color:var(--muted)">Bu branşta puan alan sporcu yok</div>` : '';

  const groupLabel = grp ? `${grp.age_label} ${grp.gender_label}` : '—';

  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div style="padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;align-items:center">
      ${strokeBtns}
      <div class="filter-sep"></div>
      ${distBtns}
    </div>
    <div style="padding:8px 12px;background:#162032;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;align-items:center">
      ${byBtns}
      <div class="filter-sep"></div>
      ${genBtns}
      <div class="filter-sep"></div>
      ${regBtns}
    </div>
    <div style="padding:8px 14px;font-size:12px;color:var(--muted)">
      <b style="color:var(--text)">${_yrDist}m ${_yrStroke}</b> · ${groupLabel}${_yrRegion?` · Bölge ${_yrRegion}`:''}
      <span style="float:right;color:var(--blue)">${athletes.length} sporcu</span>
    </div>
    ${athletes.length > 0 ? `<div style="padding:0 10px 16px"><table style="width:100%"><tbody>${rows}</tbody></table></div>` : empty}
  `;
  content.appendChild(wrap);
}

let _barajBy='2013', _barajGender='M';

function renderBarajlar(content) {
  const wrap = document.createElement('div');
  wrap.className = 'threshold-wrap';

  const AGE_LABEL = {2013:'13 Yaş',2012:'14 Yaş',2011:'15 Yaş'};
  const PTS_COLOR = {9:'var(--gold)',7:'#fb923c',6:'#facc15',5:'var(--green)',4:'var(--teal)',3:'var(--blue)',2:'var(--purple)',1:'var(--muted)'};

  // Filtre butonları
  const filterHtml = `
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
      <div style="display:flex;gap:4px">
        ${['2013','2012','2011'].map(by=>`<button onclick="_barajBy='${by}';renderAll()" class="filter-btn${_barajBy===by?' active':''}">${AGE_LABEL[by]}</button>`).join('')}
      </div>
      <div style="width:1px;background:var(--border)"></div>
      <div style="display:flex;gap:4px">
        <button onclick="_barajGender='F';renderAll()" class="filter-btn${_barajGender==='F'?' active':''}">♀ Kadın</button>
        <button onclick="_barajGender='M';renderAll()" class="filter-btn${_barajGender==='M'?' active':''}">♂ Erkek</button>
      </div>
    </div>
  `;

  const gColor = _barajGender === 'F' ? '#f472b6' : '#60a5fa';
  const title = `${AGE_LABEL[_barajBy]} ${_barajGender==='F'?'♀ Kadın':'♂ Erkek'} — Puan Barajları`;

  wrap.innerHTML = `<h3>Puan Barajları (TYF PDF)</h3>${filterHtml}
    <div style="font-size:11px;color:#64748b;margin-bottom:10px;padding:8px;background:var(--card);border-radius:6px;border:1px solid var(--border)">
      <b style="color:var(--text)">Nasıl okunur:</b> Her satırda bir branş var. O süreden <b>daha hızlı</b> yüzersen o puanı kazanırsın.
      Örneğin 13 Yaş Erkek 200m Kelebek'te <b style="color:var(--gold)">02:27.66</b> veya daha hızlı → 9 puan,
      <b style="color:#fb923c">02:30.87</b> veya daha hızlı → 7 puan. En düşük satır (1 puan) aynı zamanda yarışa giriş barajıdır.
    </div>
    <div style="font-size:12px;font-weight:700;color:${gColor};margin-bottom:6px">${title}</div>
  `;

  const events = SCORING_TABLES[_barajBy]?.[_barajGender] || [];
  const ptsCols = [9,7,6,5,4,3,2,1];

  const thCells = ptsCols.map(p=>`<th style="text-align:center;color:${PTS_COLOR[p]};font-weight:800">${p}</th>`).join('');
  let rows = '';
  events.forEach(ev => {
    const cells = ptsCols.map(p => {
      const entry = ev.pts.find(x=>x.p===p);
      return `<td style="text-align:center;font-family:monospace;font-size:11px;color:${PTS_COLOR[p]}">${entry?entry.t:'—'}</td>`;
    }).join('');
    rows += `<tr><td style="font-size:11px;white-space:nowrap">${ev.stroke} ${ev.dist}m</td>${cells}</tr>`;
  });

  const tbl = document.createElement('div');
  tbl.innerHTML = `
    <div style="overflow-x:auto">
      <table class="threshold-table" style="min-width:420px">
        <thead><tr>
          <th>Branş</th>${thCells}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="font-size:10px;color:#475569;padding:4px 0 8px">
      Kaynak: TYF 2026 Federasyon Karması PDF (2025-11-21). Süre o değer veya daha hızlı olmalıdır.
    </div>
  `;
  wrap.appendChild(tbl);
  content.appendChild(wrap);
}

function renderMatrix(content) {
  if (!DATA || !DATA.summary_matrix) {
    content.innerHTML = '<div style="padding:20px;color:var(--muted)">Veri yok</div>';
    return;
  }
  const matrix = DATA.summary_matrix;
  const AGE = {2013:'13 Yaş',2012:'14 Yaş',2011:'15 Yaş'};
  const GEN = {F:'Kadın',M:'Erkek'};

  let totalMulti=0, totalTR=0, totalBolge=0, totalAll=0;
  let rows = '';
  matrix.forEach(g => {
    const label = `${AGE[g.birth_year]||g.birth_year} ${GEN[g.gender]||g.gender}`;
    totalMulti += g.multi; totalTR += g.tr; totalBolge += g.bolge; totalAll += g.total;
    rows += `<tr>
      <td>${label}</td>
      <td class="num-multi">${g.multi}</td>
      <td class="num-tr">${g.tr}</td>
      <td class="num-bolge">${g.bolge}</td>
      <td class="club-total">${g.total}</td>
    </tr>`;
  });
  rows += `<tr>
    <td>TOPLAM</td>
    <td class="num-multi">${totalMulti}</td>
    <td class="num-tr">${totalTR}</td>
    <td class="num-bolge">${totalBolge}</td>
    <td class="club-total">${totalAll}</td>
  </tr>`;

  const wrap = document.createElement('div');
  wrap.className = 'matrix-wrap';
  wrap.innerHTML = `
    <h3>Seçim Özeti</h3>
    <table class="matrix-table">
      <thead><tr>
        <th>Grup</th>
        <th style="color:var(--gold)">Multinations</th>
        <th style="color:var(--green)">TR Kadro</th>
        <th style="color:var(--blue)">Bölge</th>
        <th>Toplam</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:12px;font-size:11px;color:var(--muted);padding:4px 0">
      ★ Eşit puanlı sporcular mor yıldız ile işaretlenmiştir. Eşitlik durumunda kural PDF'te tanımlanmamıştır — her iki sporcu da sıralamada gösterilmiştir.
    </div>
  `;
  content.appendChild(wrap);
}

// Aynı isimli sporcu tespiti
function findDuplicateAthletes() {
  if (!DATA||!DATA.groups) return [];
  const seen={};
  for (const grp of Object.values(DATA.groups)) {
    for (const a of grp.athletes) {
      if (a.selected==='MULTINATIONS') continue;
      const key=`${a.name.toLowerCase()}|${a.birth_year}|${a.gender}`;
      if(!seen[key]) seen[key]=[];
      if(!seen[key].some(s=>s.club===a.club))
        seen[key].push({name:a.name,birth_year:a.birth_year,gender:a.gender,club:a.club||'',city:a.city||'',region:a.region||0});
    }
  }
  return Object.entries(seen).filter(([,e])=>e.length>1).map(([,e])=>e);
}

function _getToken(){
  return (document.getElementById('gh-tok-sec')?.value.trim()) ||
         localStorage.getItem('karma_gh_token') || '';
}
window.adminTestToken = async function(){
  const token=_getToken();
  if(!token){showMsg('tok-msg','⚠ Token girin','#ef4444');return;}
  showMsg('tok-msg','⟳ Test ediliyor...','#f59e0b');
  try{
    const r=await fetch('https://api.github.com/repos/gokaygunduz-gg/bolge-karma-2026',
      {headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'}});
    if(r.ok) showMsg('tok-msg','✓ Token geçerli — şifre değiştirebilirsiniz','#22c55e');
    else showMsg('tok-msg',`⚠ Token hatalı (${r.status}) — repo scope seçildi mi?`,'#ef4444');
  }catch(e){showMsg('tok-msg','⚠ Bağlantı hatası','#ef4444');}
};
window.adminChangePw = async function(type){
  const token=_getToken();
  const msgId=type==='main'?'pw-main-msg':'pw-admin-msg';
  if(!token){showMsg(msgId,'⚠ Üstteki Token alanını doldurun','#ef4444');return;}
  const field=type==='main'?'new-main-pw':'new-admin-pw';
  const v=document.getElementById(field)?.value.trim();
  if(!v){showMsg(msgId,'Şifre boş olamaz','#ef4444');return;}
  showMsg(msgId,'⟳ Kaydediliyor...','#f59e0b');
  const ok=await _updateAuthJson(token, type==='main'?{pw:v}:{admin_pw:v});
  if(ok){
    showMsg(msgId,`✓ Değiştirildi: "${v}" — tüm cihazlarda geçerli`,'#22c55e');
    document.getElementById(field).value='';
    localStorage.setItem('karma_gh_token', token);
  } else {
    showMsg(msgId,'⚠ Kaydedilemedi — Token geçerli mi? "Test" butonuna basın','#ef4444');
  }
};
window.adminTogglePw = async function(){
  const token=_getToken();
  if(!token){showMsg('pw-main-msg','⚠ Üstteki Token alanını doldurun','#ef4444');return;}
  const newOff=!isPwOff();
  showMsg('pw-main-msg','⟳ Kaydediliyor...','#f59e0b');
  const ok=await _updateAuthJson(token,{pw_off:newOff});
  if(ok){ localStorage.setItem('karma_gh_token',token); renderAll(); }
  else showMsg('pw-main-msg','⚠ Kaydedilemedi','#ef4444');
};

async function _updateAuthJson(token, patch){
  try {
    const REPO='gokaygunduz-gg/bolge-karma-2026', BRANCH='gh-pages', PATH='auth.json';
    const hdr={Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'};
    const g = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}?ref=${BRANCH}`,{headers:hdr});
    if(!g.ok) return false;
    const gj = await g.json();
    const current = JSON.parse(atob(gj.content.replace(/\n/g,'')));
    Object.assign(current, patch);
    const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(current))));
    const p = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`,{
      method:'PUT', headers:{...hdr,'Content-Type':'application/json'},
      body:JSON.stringify({message:`admin: auth güncellendi`,content:newContent,sha:gj.sha,branch:BRANCH})
    });
    if(p.ok){ _auth = {...current, ...patch}; return true; }
    return false;
  } catch(e){ return false; }
}

window.adminSaveClub = function(i,club){
  const selCity=document.getElementById(`cs-${i}`)?.value||'';
  const manCity=document.getElementById(`cm-${i}`)?.value.trim()||'';
  const city=selCity||manCity;
  if(!city){showMsg(`clm-${i}`,'⚠ Şehir seçin veya yazın','#ef4444');return;}
  const regV=document.getElementById(`cr-${i}`)?.value;
  const region=parseInt(regV)||CITY_REGION[city]||0;

  const canonical=document.getElementById(`cc-${i}`)?.value.trim()||club;
  pendingClubAliases[club]={canonical,city,region};
  showMsg(`clm-${i}`,`✓ Kaydedildi: ${city} B${region}`, '#22c55e');
  setTimeout(()=>renderAll(),800);
};

    const REPO='gokaygunduz-gg/bolge-karma-2026', PATH='manual_overrides.json';
    const hdr={Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'};
    const g=await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`,{headers:hdr});
    const gj=await g.json();
    const current=JSON.parse(atob(gj.content.replace(/\n/g,'')));
    const aliases=current.club_aliases||[];
    const nameOvr=current.name_overrides||[];
    for(const[raw,d]of Object.entries(pendingClubAliases)){
      const idx=aliases.findIndex(a=>a.raw===raw);
      const e={raw,canonical:d.canonical,city:d.city,region:d.region};
      if(idx>=0) aliases[idx]=e; else aliases.push(e);
    }
    for(const[,d]of Object.entries(pendingNameOverrides)){
      const idx=nameOvr.findIndex(n=>n.name.toLowerCase()===d.name.toLowerCase()&&n.birth_year===d.birth_year&&n.gender===d.gender);
      if(idx>=0) nameOvr[idx]=d; else nameOvr.push(d);
    }
    current.club_aliases=aliases; current.name_overrides=nameOvr;
    const newContent=btoa(unescape(encodeURIComponent(JSON.stringify(current,null,2))));
    const p=await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`,{
      method:'PUT',headers:{...hdr,'Content-Type':'application/json'},
      body:JSON.stringify({message:`admin: override güncellendi (${new Date().toLocaleString('tr')})`,content:newContent,sha:gj.sha})
    });
    if(p.ok){
      showMsg('save-msg','✓ GitHub\'a kaydedildi! Actions\'tan paneli güncelleyebilirsiniz.','#22c55e');
      pendingClubAliases={}; pendingNameOverrides={};
    } else {
      const err=await p.json(); showMsg('save-msg',`⚠ Hata: ${err.message}`,'#ef4444');
    }
  } catch(e){ showMsg('save-msg',`⚠ Bağlantı hatası: ${e.message}`,'#ef4444'); }
};
window.adminCopyJson = function(){
  const obj={
    club_aliases:Object.entries(pendingClubAliases).map(([raw,d])=>({raw,canonical:d.canonical,city:d.city,region:d.region})),
    name_overrides:Object.values(pendingNameOverrides)
  };
  const txt=JSON.stringify(obj,null,2);
  navigator.clipboard.writeText(txt).then(()=>{
    showMsg('save-msg','✓ JSON kopyalandı — manual_overrides.json\'a ekleyin','#22c55e');
  }).catch(()=>{
    const m=document.getElementById('save-msg');
    if(m){m.style.display='block';m.style.color='#94a3b8';
      m.innerHTML=`<textarea style="width:100%;height:120px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:4px;padding:6px;font-size:11px">${txt}</textarea>`;}
  });
};

// ── Sonraki güncelleme hesapla (5dk) ─────────────────────────────────────────
function getNextUpdateInfo(){
  const now=new Date(),y=now.getUTCFullYear(),m=now.getUTCMonth(),d=now.getUTCDate();
  if(y!==2026||m!==3||d<17||d>20) return 'Otomatik güncelleme: 17-20 Nisan arası aktif';
  const utcH=now.getUTCHours(),utcM=now.getUTCMinutes();
  if(utcH<5||utcH>=21) return 'Güncelleme dışı saat (UTC 05-21 arası aktif)';
  const passed=utcM%5, wait=5-passed;
  const nextM=(utcM+wait)%60, nextH=utcH+(utcM+wait>=60?1:0);
  return `Sonraki güncelleme: ~${wait} dk sonra (TR ${nextH+3}:${String(nextM).padStart(2,'0')})`;
}

// ── Header sayaç (5dk = 300sn) ────────────────────────────────────────────────
function updateNextBadge(){
  const badge=document.getElementById('next-update-badge'); if(!badge)return;
  const now=new Date(),y=now.getUTCFullYear(),m=now.getUTCMonth(),d=now.getUTCDate();
  if(y!==2026||m!==3||d<17||d>20){badge.style.display='none';return;}
  const utcH=now.getUTCHours(),utcM=now.getUTCMinutes(),utcS=now.getUTCSeconds();
  if(utcH<5||utcH>=21){badge.style.display='none';return;}
  const totalSec=utcH*3600+utcM*60+utcS;
  const slotSec=Math.ceil((totalSec+1)/300)*300;  // 300 = 5 dakika
  const waitSec=slotSec-totalSec;
  badge.style.display='';
  badge.textContent=`↻ ${Math.floor(waitSec/60)}:${String(waitSec%60).padStart(2,'0')}`;
}
setInterval(updateNextBadge,1000);
updateNextBadge();

// ── Veri yükleme ──────────────────────────────────────────────────────────────
async function loadData(){
  const MISSING_URL='https://raw.githubusercontent.com/gokaygunduz-gg/bolge-karma-2026/master/data/missing_report.json?t='+Date.now();
  const isOnline = location.protocol !== 'file:';

  if(isOnline){
    try{
      const[r1,r2]=await Promise.allSettled([
        fetch('results.json?t='+Date.now()),
        fetch(MISSING_URL)
      ]);
      if(r1.status==='fulfilled'&&r1.value.ok) DATA=await r1.value.json();
      else if(window.RESULTS_DATA) DATA=window.RESULTS_DATA;
      else throw new Error('Veri yüklenemedi');
      if(r2.status==='fulfilled'&&r2.value.ok){const j=await r2.value.json();DATA._missing_clubs=j.missing_clubs||[];}
      renderAll();
    }catch(e){document.getElementById('loader').textContent='⚠ Veri yüklenemedi.';}
  } else {
    if(window.RESULTS_DATA){ DATA=window.RESULTS_DATA; renderAll(); }
    else document.getElementById('loader').textContent='⚠ Veri bulunamadı.';
  }
}

// ── Start ─────────────────────────────────────────────────────────────────────
loadData();

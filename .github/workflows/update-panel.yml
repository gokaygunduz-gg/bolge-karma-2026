name: Update Panel (Edirne Canli)

# Her 5 dakika: 17-20 Nisan UTC 05-21 (TR 08-00)
# Push trigger: master'a her push'ta çalışır
# fix_db.py: Edirne çekildikten sonra encoding düzeltmesi

on:
  push:
    branches: [master]

  schedule:
    # Her 5 dakika — 17-20 Nisan, UTC 05:00-21:00 (TR 08:00-00:00)
    - cron: '*/5 5-21 17-20 4 *'
    # Lenex kontrol saatleri — UTC: 05:50 07:50 09:50 11:50 12:50 14:50 16:50 18:50 20:50
    - cron: '50 5,7,9,11,12,14,16,18,20 17-20 4 *'

  workflow_dispatch:
    inputs:
      edirne_url:
        description: 'Edirne yaris URL'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}-v2
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set Edirne URL
        run: |
          URL="${{ github.event.inputs.edirne_url }}"
          if [ -z "$URL" ]; then
            URL="${{ vars.EDIRNE_URL }}"
          fi
          echo "EDIRNE_URL=$URL" >> $GITHUB_ENV

      - name: Fetch Edirne data
        if: env.EDIRNE_URL != ''
        run: python process_edirne_karma.py --url "$EDIRNE_URL"

      - name: Fix DB name encoding
        run: python fix_db.py

      - name: Generate panel JSON
        run: python generate_rankings_json.py

      - name: Commit to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add panel/results_inline.js panel/results.json data/bolge_karmalari.db data/missing_report.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Degisiklik yok."
          else
            git commit -m "chore: panel guncellendi ($(date -u '+%Y-%m-%d %H:%M') UTC)"
            git push
          fi

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          cp panel/index.html /tmp/gh-pages/index.html
          cp panel/results_inline.js /tmp/gh-pages/results_inline.js
          cp panel/results.json /tmp/gh-pages/results.json
          cd /tmp/gh-pages
          git add -A
          if git diff --staged --quiet; then
            echo "gh-pages degisiklik yok."
          else
            git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push origin HEAD:gh-pages
          fi

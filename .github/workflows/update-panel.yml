name: Update Panel (Edirne Canlı)

# ─────────────────────────────────────────────────────────────────────────────
# ZAMANLAMA (TR = UTC+3)
#
# Her 20 dakika:  17-20 Nisan, TR 08:00-23:59
# Lenex kontrol:  17-20 Nisan saat 08:50 10:50 12:50 14:50 15:50 17:50 19:50 21:50 23:50 (TR)
#
# Yarış yoksa EDIRNE_URL boşsa sadece generate_rankings_json.py çalışır (Antalya verisi gösterilir).
# ─────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    # Her 20 dakika — 17-20 Nisan, UTC 05:00-21:00 (TR 08:00-00:00)
    - cron: '0,10,20,30,40,50 5-21 17-20 4 *'
    # Lenex kontrol saatleri — UTC: 05:50 07:50 09:50 11:50 12:50 14:50 16:50 18:50 20:50
    - cron: '50 5,7,9,11,12,14,16,18,20 17-20 4 *'

  workflow_dispatch:
    inputs:
      edirne_url:
        description: 'Edirne yarış URL (boş bırakırsan kayıtlı URL kullanılır)'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}-v2
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set Edirne URL
        run: |
          URL="${{ github.event.inputs.edirne_url }}"
          if [ -z "$URL" ]; then
            URL="${{ vars.EDIRNE_URL }}"
          fi
          echo "EDIRNE_URL=$URL" >> $GITHUB_ENV
- name: Fix DB name encoding
        run: |
          python -c "
          import sqlite3, os
          db='data/bolge_karmalari.db'
          correct = 'Naz Haz' + chr(0x131) + 'rolan'
          wrong = 'Naz Hazirolan'
          if os.path.exists(db):
              c=sqlite3.connect(db)
              c.execute('UPDATE fed_results SET athlete_name=? WHERE athlete_name=?', (correct, wrong))
              c.execute('UPDATE fed_athlete_best SET athlete_name=? WHERE athlete_name=?', (correct, wrong))
              c.commit(); c.close()
              print('DB duzeltildi')
          "
      - name: Fetch Edirne data & update DB
        if: env.EDIRNE_URL != ''
        run: |
          python process_edirne_karma.py --url "$EDIRNE_URL"

      - name: Generate panel JSON
        run: |
          python generate_rankings_json.py

      - name: Commit updated DB & panel to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add panel/results_inline.js panel/results.json data/bolge_karmalari.db data/missing_report.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "chore: panel güncellendi ($(date -u '+%Y-%m-%d %H:%M') UTC)"
            git push
          fi

      - name: Deploy panel to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          cp panel/index.html /tmp/gh-pages/index.html
          cp panel/results_inline.js /tmp/gh-pages/results_inline.js
          cp panel/results.json /tmp/gh-pages/results.json
          cd /tmp/gh-pages
          git add -A
          if git diff --staged --quiet; then
            echo "gh-pages değişiklik yok."
          else
            git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push origin HEAD:gh-pages
          fi

name: Update Panel (Edirne Canlı)

on:
  schedule:
    # Her 30 dakikada bir — UTC 06:00-20:00 arası (TR 09:00-23:00)
    - cron: '*/30 6-20 * * *'
  workflow_dispatch:
    inputs:
      edirne_url:
        description: 'Edirne yarış URL (boş bırakırsan kayıtlı URL kullanılır)'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests openpyxl rapidfuzz

      - name: Set Edirne URL
        run: |
          URL="${{ github.event.inputs.edirne_url }}"
          if [ -z "$URL" ]; then
            URL="${{ vars.EDIRNE_URL }}"
          fi
          echo "EDIRNE_URL=$URL" >> $GITHUB_ENV

      - name: Fetch Edirne data & update DB
        if: env.EDIRNE_URL != ''
        run: |
          python process_edirne_karma.py --url "$EDIRNE_URL"

      - name: Generate panel JSON
        run: |
          python generate_rankings_json.py

      - name: Commit updated DB & JSON to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add panel/results_inline.js panel/results.json data/bolge_karmalari.db
          if git diff --staged --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "chore: panel güncellendi ($(date -u '+%Y-%m-%d %H:%M') UTC)"
            git push
          fi

      - name: Deploy panel to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # gh-pages branch'ini fetch et
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          # panel/ içeriğini kopyala
          cp panel/index.html /tmp/gh-pages/index.html
          cp panel/results_inline.js /tmp/gh-pages/results_inline.js
          cp panel/results.json /tmp/gh-pages/results.json
          # push
          cd /tmp/gh-pages
          git add -A
          if git diff --staged --quiet; then
            echo "gh-pages değişiklik yok."
          else
            git commit -m "deploy: panel $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push origin HEAD:gh-pages
          fi

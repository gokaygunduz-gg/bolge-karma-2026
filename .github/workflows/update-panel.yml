name: Update Panel (Edirne Canli)

on:
  schedule:
    - cron: '0,10,20,30,40,50 5-21 17-20 4 *'
    - cron: '50 5,7,9,11,12,14,16,18,20 17-20 4 *'
  workflow_dispatch:
    inputs:
      edirne_url:
        description: 'Edirne yaris URL'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}-v2
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set Edirne URL
        run: |
          URL="${{ github.event.inputs.edirne_url }}"
          if [ -z "$URL" ]; then
            URL="${{ vars.EDIRNE_URL }}"
          fi
          echo "EDIRNE_URL=$URL" >> $GITHUB_ENV

      - name: Fix DB name encoding
        run: python -c "import sqlite3,os; db='data/bolge_karmalari.db'; c=sqlite3.connect(db) if os.path.exists(db) else None; c and (c.execute('UPDATE fed_results SET athlete_name=? WHERE athlete_name=?',('Naz Haz'+chr(305)+'rolan','Naz Hazirolan')),c.execute('UPDATE fed_athlete_best SET athlete_name=? WHERE athlete_name=?',('Naz Haz'+chr(305)+'rolan','Naz Hazirolan')),c.commit(),c.close())"

      - name: Fetch Edirne data
        if: env.EDIRNE_URL != ''
        run: python process_edirne_karma.py --url "$EDIRNE_URL"

      - name: Generate panel JSON
        run: python generate_rankings_json.py

      - name: Commit to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add panel/results_inline.js panel/results.json data/bolge_karmalari.db data/missing_report.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Degisiklik yok."
          else
            git commit -m "chore: panel guncellendi ($(date -u '+%Y-%m-%d %H:%M') UTC)"
            git push
          fi

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          cp panel/index.html /tmp/gh-pages/index.html
          cp panel/results_inline.js /tmp/gh-pages/results_inline.js
          cp panel/results.json /tmp/gh-pages/results.json
          cd /tmp/gh-pages
          git add -A
          if git diff --staged --quiet; then
            echo "gh-pages degisiklik yok."
          else
            git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push origin HEAD:gh-pages
          fi
